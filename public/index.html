<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>Криста 9</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #ddd;
    }
    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      /* шапка + средний блок + панель = авто высота, центрируется flex'ом body */
    }
    .top-header {
      background: #181818;
      padding: 8px 14px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: #ccc;
      border: 1px solid #2a2a2a;
      border-bottom: none;
    }
    /* фиксированный средний блок с соотношением 1:1.5 */
    .screens-wrapper {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 150%; /* 1:1.5 */
      background: #111;
      border: 1px solid #2a2a2a;
      border-top: none;
      border-bottom: none;
    }
    .screens-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
    }
    .screen {
      display: none;
      padding: 12px;
      height: 100%;
    }
    .screen.active { display: block; }

    .bottom-nav {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-top: none;
      display: flex;
      justify-content: space-around;
      padding: 6px 0;
    }
    .nav-btn {
      background: transparent;
      border: none;
      color: #999;
      font-size: 14px;
      padding: 8px 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .nav-btn.active {
      color: #6c5ce7;
      border-bottom-color: #6c5ce7;
    }

    /* Чат-лист */
    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }
    .chat-info .name { font-size: 15px; color: #eee; }
    .chat-info .last-msg { font-size: 12px; color: #888; }

    /* Комната чата */
    .chat-room {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-room-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 8px;
    }
    .back-btn {
      background: none;
      border: none;
      color: #6c5ce7;
      font-size: 18px;
      cursor: pointer;
    }
    .chat-room-messages {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .message {
      padding: 6px 8px;
      margin-bottom: 6px;
      background: #1a1a1a;
      border-left: 2px solid #444;
    }
    .message.self { border-left-color: #6c5ce7; }
    .message .sender { font-size: 12px; color: #888; }
    .message .text { font-size: 14px; color: #ddd; margin: 4px 0; }
    .message .time { font-size: 10px; color: #666; text-align: right; }

    .chat-room-input {
      display: flex;
      margin-top: 6px;
    }
    .chat-room-input input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 6px 10px;
      color: #ddd;
      font-size: 14px;
      outline: none;
    }
    .chat-room-input button {
      background: #6c5ce7;
      border: none;
      color: #fff;
      padding: 6px 14px;
      margin-left: 6px;
      cursor: pointer;
    }

    /* Поиск */
    .search-bar { margin-bottom: 10px; }
    .search-bar input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 6px 10px;
      color: #ddd;
      outline: none;
    }

    .create-btn {
      background: #6c5ce7;
      border: none;
      color: #fff;
      padding: 8px 16px;
      margin: 10px 0;
      cursor: pointer;
      font-size: 14px;
    }

    /* Музыка */
    .track-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #222;
      cursor: pointer;
      font-size: 14px;
      color: #ccc;
    }
    .track-row .upload-time { color: #888; width: 60px; }
    .track-row .track-title { flex: 1; text-align: center; }
    .track-row .track-duration { color: #888; width: 50px; text-align: right; }

    .player-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #2a2a2a;
      margin-top: 10px;
    }
    .ctrl-btn {
      background: #2a2a2a;
      border: none;
      color: #ddd;
      padding: 8px 12px;
      cursor: pointer;
    }

    /* Настройки */
    .setting-row { margin-bottom: 12px; }
    .setting-row label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; }
    .setting-row input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 6px 10px;
      color: #ddd;
      outline: none;
    }
    .btn-logout {
      background: #b71c1c;
      border: none;
      color: #fff;
      padding: 8px 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Модалка создания чата */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 16px;
      width: 90%;
      max-width: 300px;
    }
    .modal h3 { margin-bottom: 12px; font-size: 16px; color: #ccc; }
    .modal input[type="text"], .modal input[type="password"] {
      width: 100%;
      background: #222;
      border: 1px solid #333;
      padding: 6px 10px;
      color: #ddd;
      margin-bottom: 8px;
      outline: none;
    }
    .modal button {
      background: #6c5ce7;
      border: none;
      color: #fff;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    .modal .secondary { background: #333; margin-left: 6px; }
    .toggle-row {
      display: flex; align-items: center; gap: 8px; margin: 8px 0; color: #ccc; font-size: 14px;
    }

    /* Экран авторизации (отдельный экран с фоном) */
    .auth-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://img.freepik.com/free-photo/abstract-chromatic-gradient_23-2151920641.jpg?semt=ais_hybrid&w=740&q=80') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .auth-box {
      background: rgba(0,0,0,0.7);
      padding: 20px;
      width: 280px;
      text-align: center;
      border: 1px solid #444;
    }
    .auth-box input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background: #222;
      border: 1px solid #444;
      color: #ddd;
      outline: none;
    }
    .auth-box button {
      background: #6c5ce7;
      border: none;
      color: #fff;
      padding: 8px 16px;
      cursor: pointer;
      margin: 4px;
    }
    .auth-box .small-text { font-size: 12px; color: #aaa; margin-top: 8px; }
    .auth-error { color: #f7768e; margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Шапка -->
  <div class="top-header">Криста 9</div>

  <!-- Средний фиксированный блок (1:1.5) -->
  <div class="screens-wrapper">
    <div class="screens-container">
      <!-- Экран Чатов -->
      <div id="chatsScreen" class="screen active">
        <div class="search-bar">
          <input type="text" placeholder="Поиск чатов или UIN" id="searchInput">
        </div>
        <div id="searchResults" style="margin-bottom:8px;"></div>
        <div id="chatListContainer">
          <div id="chatList"></div>
        </div>
        <button class="create-btn" id="createChatBtn">Создать чат</button>
        <!-- Экран комнаты чата (скрыт) -->
        <div id="chatRoomContainer" style="display:none; height:100%; flex-direction:column;">
          <div class="chat-room">
            <div class="chat-room-header">
              <button class="back-btn" id="backToChatList">←</button>
              <span id="chatRoomName" style="font-weight:bold;"></span>
              <span id="chatRoomStatus" style="font-size:12px;color:#888;"></span>
            </div>
            <div class="chat-room-messages" id="chatMessages"></div>
            <div class="chat-room-input">
              <input type="text" placeholder="Сообщение..." id="messageInput">
              <button id="sendBtn">Отправить</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Экран Музыки -->
      <div id="musicScreen" class="screen">
        <div style="font-size:16px; margin-bottom:8px;">Плеер</div>
        <div id="trackList"></div>
        <div class="player-controls">
          <button class="ctrl-btn" id="rewindBack">⏪</button>
          <button class="ctrl-btn" id="playBtn">▶️</button>
          <button class="ctrl-btn" id="rewindForward">⏩</button>
          <button class="ctrl-btn" id="uploadMusicBtn">Загрузить</button>
        </div>
      </div>

      <!-- Экран Настроек -->
      <div id="settingsScreen" class="screen">
        <div class="setting-row">
          <label>Ваш UIN</label>
          <div id="settingsUin" style="padding:6px; background:#1a1a1a; border:1px solid #2a2a2a;">------</div>
        </div>
        <div class="setting-row">
          <label>Никнейм</label>
          <input type="text" id="nicknameInput">
        </div>
        <button class="btn-logout" id="logoutBtn">Выйти</button>
      </div>
    </div>
  </div>

  <!-- Нижняя панель -->
  <div class="bottom-nav">
    <button class="nav-btn active" data-screen="chatsScreen">Чаты</button>
    <button class="nav-btn" data-screen="musicScreen">Музыка</button>
    <button class="nav-btn" data-screen="settingsScreen">Настройки</button>
  </div>
</div>

<!-- Экран авторизации (поверх всего) -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <h3 id="authTitle" style="color:#ccc; margin-bottom:12px;">Вход</h3>
    <input type="text" id="authLogin" placeholder="UIN">
    <input type="password" id="authPassword" placeholder="Пароль">
    <input type="text" id="authNick" placeholder="Никнейм" style="display:none;">
    <button id="authSubmitBtn">Войти</button>
    <button id="toggleAuthMode" class="secondary">Регистрация</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- Модалка создания чата -->
<div class="modal-overlay" id="createChatModal">
  <div class="modal">
    <h3>Создать чат</h3>
    <input type="text" placeholder="Название" id="newChatName">
    <div class="toggle-row">
      <input type="checkbox" id="adminOnlyCheck">
      <label for="adminOnlyCheck">Писать может только администратор</label>
    </div>
    <button id="createChatSubmit">Создать</button>
    <button class="secondary" id="closeCreateChatModal">Отмена</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
const socket = io();
let currentUser = null;
let currentRoomId = null;

const screens = document.querySelectorAll('.screen');
const navButtons = document.querySelectorAll('.nav-btn');
const authScreen = document.getElementById('authScreen');
const authTitle = document.getElementById('authTitle');
const authLogin = document.getElementById('authLogin');
const authPassword = document.getElementById('authPassword');
const authNick = document.getElementById('authNick');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const toggleAuthBtn = document.getElementById('toggleAuthMode');
const authError = document.getElementById('authError');
const chatList = document.getElementById('chatList');
const chatListContainer = document.getElementById('chatListContainer');
const chatRoomContainer = document.getElementById('chatRoomContainer');
const chatRoomName = document.getElementById('chatRoomName');
const chatRoomStatus = document.getElementById('chatRoomStatus');
const chatMessages = document.getElementById('chatMessages');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const backToChatList = document.getElementById('backToChatList');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const trackList = document.getElementById('trackList');
const playBtn = document.getElementById('playBtn');
const rewindBack = document.getElementById('rewindBack');
const rewindForward = document.getElementById('rewindForward');
const uploadMusicBtn = document.getElementById('uploadMusicBtn');
const settingsUin = document.getElementById('settingsUin');
const nicknameInput = document.getElementById('nicknameInput');
const logoutBtn = document.getElementById('logoutBtn');
const createChatBtn = document.getElementById('createChatBtn');
const createChatModal = document.getElementById('createChatModal');
const closeCreateChatModal = document.getElementById('closeCreateChatModal');
const createChatSubmit = document.getElementById('createChatSubmit');
const adminOnlyCheck = document.getElementById('adminOnlyCheck');
const newChatName = document.getElementById('newChatName');

let authMode = 'login';
let currentAudio = null;

// ========== НАВИГАЦИЯ ПО ВКЛАДКАМ ==========
navButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.screen;
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById(target).classList.add('active');
    navButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // дополнительные действия
    if (target === 'chatsScreen') loadChatList();
    if (target === 'musicScreen') loadMusicList();
  });
});

// ========== АВТОРИЗАЦИЯ ==========
toggleAuthBtn.addEventListener('click', () => {
  if (authMode === 'login') {
    authMode = 'register';
    authTitle.textContent = 'Регистрация';
    authSubmitBtn.textContent = 'Создать аккаунт';
    authNick.style.display = '';
    authLogin.style.display = 'none';
  } else {
    authMode = 'login';
    authTitle.textContent = 'Вход';
    authSubmitBtn.textContent = 'Войти';
    authNick.style.display = 'none';
    authLogin.style.display = '';
  }
});

authSubmitBtn.addEventListener('click', () => {
  const password = authPassword.value;
  const nick = authNick.value.trim();
  if (!password) { authError.textContent = 'Введите пароль'; return; }
  if (authMode === 'register') {
    if (!nick) { authError.textContent = 'Никнейм обязателен'; return; }
    socket.emit('register', { password, nick });
  } else {
    const login = authLogin.value.trim();
    if (!login) { authError.textContent = 'Введите UIN'; return; }
    socket.emit('login', { login, password });
  }
});

socket.on('authError', msg => { authError.textContent = msg; });
socket.on('authSuccess', profile => {
  currentUser = profile;
  localStorage.setItem('k9_token', profile.token);
  authScreen.style.display = 'none';
  // показать приложение
  document.getElementById('chatsScreen').classList.add('active');
  settingsUin.textContent = profile.uin;
  nicknameInput.value = profile.nick;
  loadChatList();
});
socket.on('tokenLoginResult', res => {
  if (res.success) {
    currentUser = res.profile;
    authScreen.style.display = 'none';
    document.getElementById('chatsScreen').classList.add('active');
    settingsUin.textContent = res.profile.uin;
    nicknameInput.value = res.profile.nick;
    loadChatList();
  } else {
    localStorage.removeItem('k9_token');
    authScreen.style.display = 'flex';
  }
});

// Проверить токен при загрузке
const token = localStorage.getItem('k9_token');
if (token) {
  socket.emit('loginByToken', token);
} else {
  authScreen.style.display = 'flex';
}

// ========== ВЫХОД ==========
logoutBtn.addEventListener('click', () => {
  localStorage.removeItem('k9_token');
  location.reload();
});

// ========== ЗАГРУЗКА СПИСКА ЧАТОВ ==========
function loadChatList() {
  if (!currentUser) return;
  socket.emit('getMainList');
}
socket.on('mainList', ({ contacts, rooms }) => {
  let html = '';
  rooms.forEach(r => {
    html += `<div class="chat-item" data-room="${r.id}" data-name="${escapeHtml(r.name)}">
      <div class="chat-info">
        <div class="name">${escapeHtml(r.name)}${r.adminOnly ? ' [только админ]' : ''}</div>
      </div>
    </div>`;
  });
  contacts.forEach(c => {
    html += `<div class="chat-item" data-contact="${c.id}" data-nick="${escapeHtml(c.nick)}">
      <div class="chat-info">
        <div class="name">${escapeHtml(c.nick)}</div>
        <div class="last-msg">${c.online ? 'В сети' : 'Не в сети'}</div>
      </div>
    </div>`;
  });
  chatList.innerHTML = html || '<div style="color:#888;">Нет чатов</div>';
  attachChatListListeners();
});

function attachChatListListeners() {
  document.querySelectorAll('.chat-item[data-room]').forEach(el => {
    el.addEventListener('click', () => openRoom(el.dataset.room, el.dataset.name));
  });
  document.querySelectorAll('.chat-item[data-contact]').forEach(el => {
    el.addEventListener('click', () => {
      socket.emit('startPrivateChat', el.dataset.contact);
    });
  });
}

createChatBtn.addEventListener('click', () => {
  createChatModal.classList.add('visible');
});
closeCreateChatModal.addEventListener('click', () => {
  createChatModal.classList.remove('visible');
});
createChatSubmit.addEventListener('click', () => {
  const name = newChatName.value.trim();
  if (!name) return;
  socket.emit('createRoom', { name, adminOnly: adminOnlyCheck.checked });
  createChatModal.classList.remove('visible');
  newChatName.value = '';
});
socket.on('roomCreated', () => loadChatList());

// ========== ОТКРЫТИЕ КОМНАТЫ ==========
function openRoom(roomId, name) {
  currentRoomId = roomId;
  chatRoomName.textContent = name;
  chatRoomStatus.textContent = '';
  chatMessages.innerHTML = '';
  chatListContainer.style.display = 'none';
  chatRoomContainer.style.display = 'flex';
  socket.emit('joinRoom', roomId);
}

backToChatList.addEventListener('click', () => {
  chatRoomContainer.style.display = 'none';
  chatListContainer.style.display = 'block';
  currentRoomId = null;
});

socket.on('roomInfo', ({ messages }) => {
  chatMessages.innerHTML = '';
  messages.forEach(msg => appendMessage(msg));
});
socket.on('newMessage', msg => {
  if (currentRoomId === msg.roomId) appendMessage(msg);
});
socket.on('privateRoomReady', (data) => {
  openRoom(data.roomId, data.targetNick);
});

function appendMessage(msg) {
  const div = document.createElement('div');
  div.className = 'message' + (msg.userId === currentUser.uin ? ' self' : '');
  div.innerHTML = `
    <div class="sender">${escapeHtml(msg.user)}</div>
    <div class="text">${escapeHtml(msg.text)}</div>
    <div class="time">${msg.time || ''}</div>
  `;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

sendBtn.addEventListener('click', () => {
  const text = messageInput.value.trim();
  if (!text || !currentRoomId) return;
  socket.emit('chatMessage', { roomId: currentRoomId, text });
  messageInput.value = '';
});

// ========== ПОИСК ==========
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { searchResults.innerHTML = ''; return; }
  socket.emit('globalSearch', { query: q });
});
socket.on('searchResults', results => {
  if (!results.length) {
    searchResults.innerHTML = '<div style="color:#888;">Ничего не найдено</div>';
    return;
  }
  searchResults.innerHTML = results.map(item => {
    if (item.type === 'user') {
      return `<div class="chat-item" data-contact="${item.uin}" data-nick="${escapeHtml(item.nick)}">
        <div class="chat-info"><div class="name">${escapeHtml(item.nick)}</div></div>
      </div>`;
    } else {
      return `<div class="chat-item" data-room="${item.id}" data-name="${escapeHtml(item.name)}">
        <div class="chat-info"><div class="name">${escapeHtml(item.name)}</div></div>
      </div>`;
    }
  }).join('');
  attachChatListListeners();
});

// ========== МУЗЫКА ==========
function loadMusicList() {
  fetch('/api/music')
    .then(res => res.json())
    .then(tracks => {
      if (!tracks.length) {
        trackList.innerHTML = '<div style="color:#888;">Нет треков</div>';
        return;
      }
      trackList.innerHTML = tracks.map(t => {
        const uploadTime = new Date(t.uploadedAt).toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        const duration = t.durationFormatted;
        return `<div class="track-row" data-url="${t.url}" data-title="${escapeHtml(t.title)}">
          <span class="upload-time">${uploadTime}</span>
          <span class="track-title">${t.title}</span>
          <span class="track-duration">${duration}</span>
        </div>`;
      }).join('');
      attachTrackListeners();
    })
    .catch(err => {
      trackList.innerHTML = '<div style="color:#f88;">Ошибка загрузки</div>';
    });
}

function attachTrackListeners() {
  document.querySelectorAll('.track-row').forEach(row => {
    row.addEventListener('click', () => {
      const url = row.dataset.url;
      if (currentAudio) currentAudio.pause();
      currentAudio = new Audio(url);
      currentAudio.play();
      playBtn.textContent = '⏸';
    });
  });
}

playBtn.addEventListener('click', () => {
  if (!currentAudio) return;
  if (currentAudio.paused) {
    currentAudio.play();
    playBtn.textContent = '⏸';
  } else {
    currentAudio.pause();
    playBtn.textContent = '▶️';
  }
});
rewindBack.addEventListener('click', () => { if (currentAudio) currentAudio.currentTime -= 5; });
rewindForward.addEventListener('click', () => { if (currentAudio) currentAudio.currentTime += 5; });

uploadMusicBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.mp3,.acc,.aac,.wav,.flac';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const form = new FormData();
    form.append('music', file);
    form.append('title', file.name.replace(/\.[^/.]+$/, ''));
    form.append('userId', currentUser.uin);
    try {
      const res = await fetch('/upload/music', { method: 'POST', body: form });
      if (res.ok) {
        loadMusicList();
      } else {
        alert('Ошибка загрузки');
      }
    } catch (err) {
      alert('Ошибка сети');
    }
  };
  input.click();
});

// ========== НАСТРОЙКИ ==========
nicknameInput.addEventListener('change', () => {
  const nick = nicknameInput.value.trim();
  if (nick && currentUser) {
    socket.emit('updateProfile', { nick });
  }
});

// ========== УТИЛИТЫ ==========
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
